# .github/workflows/System-Status-Core-Updater.yml
# PHASE 1 EMERGENCY FIX — 2026-06-17
# Fixes: syntax errors (iandN, new Error template literals, missing parens on tagged templates),
#        new-repo detection (accepts 'building' as valid Pages),
#        fragile wiki paths (GITHUB_WORKSPACE),
#        deprecated upload-pages-artifact@v3 -> v4.

name: System Status Core Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: system-core-updater
  cancel-in-progress: true

jobs:
  update-status:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute System Discovery & Status Check
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -z "$PUBLIC_REPO_TOKEN" ]; then
            echo "::error::PUBLIC_REPO_TOKEN missing. Ensure it is set in repository secrets."
            exit 1
          fi

          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const userName = 'anacondy';

          function formatDate(dateString) {
            if (!dateString || dateString === 'Unknown') return 'Unknown';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString;
            const day = date.getDate().toString().padStart(2, '0');
            const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const month = monthNames[date.getMonth()];
            const year = date.getFullYear();
            return `${day}-${month}-${year}`;
          }

          function calculateDateGap(creationDate, additionDate) {
            const creation = new Date(creationDate);
            const addition = new Date(additionDate);
            if (isNaN(creation.getTime()) || isNaN(addition.getTime())) return 'Unknown';
            const gap = Math.floor((addition - creation) / (1000 * 60 * 60 * 24));
            return `${gap} days`;
          }

          async function githubApiRequest(path, method = 'GET', body = null, retries = 5) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.github.com',
                path: path,
                method: method,
                headers: {
                  'User-Agent': 'SystemStatusChecker/2.0',
                  'Accept': 'application/vnd.github+json',
                  'Authorization': `Bearer ${process.env.PUBLIC_REPO_TOKEN}`,
                  'X-GitHub-Api-Version': '2022-11-28'
                }
              };

              const makeRequest = () => {
                const req = https.request(options, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    if (res.statusCode >= 200 && res.statusCode < 300) {
                      try { resolve(JSON.parse(data)); }
                      catch (e) { reject(new Error(`JSON Parse Error: ${e.message}`)); }
                    } else if (res.statusCode === 403 || res.statusCode === 429) {
                      if (retries > 0) {
                        setTimeout(() => githubApiRequest(path, method, body, retries - 1).then(resolve).catch(reject), 10000);
                      } else {
                        reject(new Error(`Rate limit exceeded (HTTP ${res.statusCode})`));
                      }
                    } else if (res.statusCode === 404 && method === 'GET') {
                      resolve(null);
                    } else {
                      reject(new Error(`HTTP ${res.statusCode}`));
                    }
                  });
                });

                req.on('error', (err) => {
                  if (retries > 0) {
                    setTimeout(() => githubApiRequest(path, method, body, retries - 1).then(resolve).catch(reject), 5000);
                  } else {
                    reject(err);
                  }
                });

                if (body) req.write(body);
                req.end();
              };

              makeRequest();
            });
          }

          async function checkUrl(url) {
            return new Promise((resolve) => {
              const req = https.request(url, {
                method: 'HEAD',
                timeout: 10000,
                headers: { 'User-Agent': 'Mozilla/5.0' }
              }, (res) => {
                if (res.statusCode === 200 || res.statusCode === 301 || res.statusCode === 302) {
                  resolve('active');
                } else if (res.statusCode === 404) {
                  resolve('404');
                } else {
                  resolve('building');
                }
              });
              req.on('error', () => resolve('404'));
              req.on('timeout', () => { req.destroy(); resolve('building'); });
              req.end();
            });
          }

          const delay = ms => new Promise(res => setTimeout(res, ms));

          async function discoverRepositories() {
            const allRepos = [];
            let page = 1;
            while (true) {
              const repos = await githubApiRequest(`/users/${userName}/repos?type=public&per_page=100&page=${page}`);
              if (!repos || repos.length === 0) break;
              allRepos.push(...repos);
              if (repos.length < 100) break;
              page++;
              await delay(1000);
            }
            return allRepos;
          }

          async function hasGitHubPages(repoName) {
            try {
              const pages = await githubApiRequest(`/repos/${userName}/${repoName}/pages`);
              return !!(pages && (pages.html_url || pages.status));
            } catch (error) {
              // Fallback: if Pages API fails (404 / no permission), try HEAD to the live URL.
              // PHASE 1 FIX: accept 'active' OR 'building' as valid so new repos are captured immediately.
              const urlStatus = await checkUrl(`https://${userName}.github.io/${repoName}/`);
              return urlStatus === 'active' || urlStatus === 'building';
            }
          }

          async function run() {
            const allRepos = await discoverRepositories();
            let existingRepos = {};
            try {
              const fileData = JSON.parse(fs.readFileSync('repos.json', 'utf8'));
              fileData.forEach(r => existingRepos[r.name] = r);
            } catch (e) { /* ignore missing/corrupt repos.json */ }

            const reposData = [];
            const workflowVersion = process.env.GITHUB_RUN_NUMBER || 'Unknown';
            const todayIso = new Date().toISOString().split('T')[0];

            for (const repo of allRepos) {
              const hasPages = await hasGitHubPages(repo.name);
              if (!hasPages) continue;

              const pagesUrl = `https://${userName}.github.io/${repo.name}/`;
              const status = await checkUrl(pagesUrl);

              let repoDate = todayIso;
              if (existingRepos[repo.name]) {
                repoDate = existingRepos[repo.name].date;
                // If it just became active from a non-active state, mark the date it came online.
                if (status === 'active' && existingRepos[repo.name].status !== 'active') {
                  repoDate = todayIso;
                }
              }

              reposData.push({
                name: repo.name,
                url: pagesUrl,
                date: repoDate,
                status: status,
                workflow_version: workflowVersion,
                created_at: repo.created_at.split('T')[0],
                date_gap: calculateDateGap(repo.created_at, repoDate)
              });

              await delay(200);
            }

            reposData.sort((a, b) => new Date(b.date) - new Date(a.date));
            fs.writeFileSync('repos.json', JSON.stringify(reposData, null, 2));

            // Build Repository-Status-and-History.md
            let wikiContent = `# Repository Status and History\n\n`;
            wikiContent += `## Workflow #${workflowVersion} (${formatDate(new Date().toISOString())})\n\n`;
            wikiContent += `| Repository Name | Link | Added Date | Creation Date | Date Gap | Status | Workflow Version |\n`;
            wikiContent += `|---|---|---|---|---|---|---|\n`;
            reposData.forEach(r => {
              wikiContent += `| ${r.name} | [Link](${r.url}) | ${formatDate(r.date)} | ${formatDate(r.created_at)} | ${r.date_gap} | ${r.status} | #${r.workflow_version} |\n`;
            });
            fs.writeFileSync('Repository-Status-and-History.md', wikiContent);

            // PHASE 1 FIX: also write a simple CHANGELOG.md so the template stops being empty.
            let changeLog = `# Changelog — Workflow #${workflowVersion}\n\n`;
            changeLog += `**Generated:** ${todayIso}\n\n`;
            const activeCount = reposData.filter(r => r.status === 'active').length;
            const buildingCount = reposData.filter(r => r.status === 'building').length;
            const deadCount = reposData.filter(r => r.status === '404').length;
            changeLog += `- **Total Repositories:** ${reposData.length}\n`;
            changeLog += `- **Active:** ${activeCount} | **Building:** ${buildingCount} | **404:** ${deadCount}\n\n`;
            if (deadCount > 0) {
              changeLog += `## Dead / 404 Repositories\n\n`;
              reposData.filter(r => r.status === '404').forEach(r => {
                changeLog += `- ${r.name}: ${r.url}\n`;
              });
              changeLog += `\n`;
            }
            fs.writeFileSync('CHANGELOG.md', changeLog);
          }

          run().catch(err => {
            console.error('Core failure:', err);
            process.exit(1);
          });
          EOF

      - name: Commit Core Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add repos.json Repository-Status-and-History.md CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: system telemetry update [skip ci]"
            git push
          fi

      - name: Sync to Wiki
        continue-on-error: true
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          # PHASE 1 FIX: use absolute paths instead of fragile cd ..
          git clone "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/anacondy/3-DVD-archieve.wiki.git" "${GITHUB_WORKSPACE}/wiki-repo"
          cp "${GITHUB_WORKSPACE}/Repository-Status-and-History.md" "${GITHUB_WORKSPACE}/wiki-repo/"
          cd "${GITHUB_WORKSPACE}/wiki-repo"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Repository-Status-and-History.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: sync telemetry [skip ci]"
            git push
          fi

  deploy-pages:
    needs: update-status
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
