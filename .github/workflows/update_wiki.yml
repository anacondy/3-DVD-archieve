name: Update Repository Status Wiki

on:
  schedule:
    - cron: '0 * * * *'  # Runs hourly
  workflow_dispatch:

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4.1.1
        with:
          path: main

      - name: Checkout Wiki
        uses: actions/checkout@v4.1.1
        with:
          repository: anacondy/3-DVD-archieve.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Repository Data
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               https://api.github.com/user/repos > repos.json

      - name: Process Data and Update Wiki
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 main/update_wiki.py

      - name: Commit Changes
        run: |
          cd wiki
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Update repository status"
            git push
          fi